name: Frontend CI/CD
on:
  push:
    branches: [main]
    paths: ['Frontend/**', '.github/workflows/frontend.yml']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'
        cache: 'npm'
    
    - name: Install & Build Frontend  # ✅ FIXED
      run: |
        cd Frontend
        npm install                    # ✅ npm install (not npm ci)
        echo 'VITE_API_URL=/api' > .env
        npm run build
    
    - name: Deploy to EC2
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "Frontend/dist/**/*"
        target: "/var/www/resolvex/"
        strip_components: 0
        rm: true  # ✅ Clear old files
    
    - name: Fix Permissions
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo chown -R www-data:www-data /var/www/resolvex
          sudo systemctl reload nginx
          curl -I http://localhost/
