name: Frontend CI/CD (Simple)

on:
  push:
    branches: [main]
    paths: ['Frontend/**']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Write SSH Key
      run: |
        echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
        chmod 600 key.pem

    - name: Deploy Frontend via Git Pull
      run: |
        ssh -i key.pem -o StrictHostKeyChecking=no \
        ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "Pulling latest code..."
          cd ~/ResolveX-AI
          

          echo "Building frontend..."
          cd Frontend
          git fetch origin
          git reset --hard origin/main
          npm install
          npm run build

          echo "Deploying to nginx..."
          sudo rm -rf /var/www/resolvex/*
          sudo cp -r dist/* /var/www/resolvex/

          echo "Fixing permissions..."
          sudo chown -R www-data:www-data /var/www/resolvex

          echo "Reloading nginx..."
          sudo systemctl reload nginx

          echo "DONE"

        EOF